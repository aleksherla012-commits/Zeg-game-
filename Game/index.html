<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veil of Riddles</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ekran startowy -->
    <div id="start-screen">
        <h1>LABYRINTH</h1>
        <h2>VEIL OF RIDDLES</h2>
        <div class="menu">
            <div class="menu-item" id="btn-new">New Game <span>▷</span></div>
            <div class="menu-item" id="btn-continue">Continue <span>↺</span></div>
            <div class="menu-item" id="btn-settings">Settings <span>⚙</span></div>
            <div class="menu-item" id="btn-quit">Quit <span>✕</span></div>
        </div>
    </div>
    <div id="settings-screen" style="display: none;">
        <h1>Settings</h1>
        <div class="menu">
            <div class="menu-item" id="btn-mute">Dźwięk: WŁ <span>🔊</span></div>
        <div class="menu-item" id="btn-lang">Język: PL <span>🌐</span></div>
        <div class="menu-item" id="btn-back">Powrót <span>↩</span></div>
        </div>
    </div>
    <!-- pulapka 1 -->
    <div id="riddle-overlay">
    <div id="riddle-box">
        <p id="riddle-question"></p>
        <div id="riddle-buttons"></div>
    </div>
</div>

    <!-- gra -->
    <canvas id="canvas_gry" width="780" height="670"></canvas>
    <script src="JavaScript/sounds.js"></script>
    <script src="JavaScript/maze.js"></script>
    <script src="JavaScript/player.js"></script>
    <script src="JavaScript/render.js"></script>
    <script src="JavaScript/enemies.js"></script>
    <script src="JavaScript/app.js"></script>
</body>
</html>
