<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veil of Riddles</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ekran startowy -->
    <div id="start-screen">
        <h1>LABYRINTH</h1>
        <h2>VEIL OF RIDDLES</h2>
        <div class="menu">
            <div class="menu-item" id="btn-new">New Game <span>▷</span></div>
            <div class="menu-item" id="btn-continue">Continue <span>↺</span></div>
            <div class="menu-item" id="btn-settings">Settings <span>⚙</span></div>
            <div class="menu-item" id="btn-quit">Quit <span>✕</span></div>
        </div>
    </div>
    <!-- pulapka 1 -->
    <div id="riddle-overlay">
    <div id="riddle-box">
        <p id="riddle-question">Wybierz właściwy kolor:</p>
        <div id="riddle-buttons">
            <button class="riddle-btn" style="background:#e74c3c;" data-color="czerwony"></button>
            <button class="riddle-btn" style="background:gold;"    data-color="zloty"></button>
            <button class="riddle-btn" style="background:#9b59b6;" data-color="fioletowy"></button>
            <button class="riddle-btn" style="background:#1abc9c;" data-color="zielony"></button>
        </div>
    </div>
</div>

    <!-- gra -->
    <canvas id="canvas_gry" width="780" height="670"></canvas>
    <script src="sounds.js"></script>
    <script src="maze.js"></script>
    <script src="player.js"></script>
    <script src="render.js"></script>
    <script src="enemies.js"></script>
    <script src="app.js"></script>
</body>
</html>
